name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name CleanTubeStudio --add-data "templates;templates" --add-data "static;static" --add-data "prompts;prompts" app.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: CleanTubeStudio-Windows
          path: dist/CleanTubeStudio.exe
