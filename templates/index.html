<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CleanTube Studio</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">CleanTube Studio</p>
            <h1>영상 제작</h1>
          </div>
          <div class="status" id="status">대기 중</div>
        </header>

        <form id="videoForm" class="creator">
          <section class="script-panel">
            <label for="script">최종 대본</label>
            <textarea id="script" name="script" rows="16" placeholder="완성된 대본을 여기에 붙여넣으세요."></textarea>
          </section>

          <aside class="settings-panel">
            <div class="field">
              <label for="elevenlabs_key">ElevenLabs API 키</label>
              <input id="elevenlabs_key" name="elevenlabs_key" type="password" autocomplete="off" placeholder="선택 입력" />
              <p class="hint" id="ttsHint">키를 입력하지 않으면 TTS는 비활성화되고 무음 영상으로 생성됩니다.</p>
            </div>

            <div class="field">
              <label for="voice_id">Voice ID</label>
              <input id="voice_id" name="voice_id" type="text" value="21m00Tcm4TlvDq8ikWAM" />
            </div>

            <div class="field">
              <label for="images">이미지 업로드</label>
              <input id="images" name="images" type="file" accept="image/*" multiple />
              <p class="hint">이미지가 없으면 배경 슬라이드와 대본 텍스트로 임시 영상을 만듭니다.</p>
            </div>

            <div class="split">
              <div class="field">
                <label for="wrap_chars">자막 줄바꿈</label>
                <input id="wrap_chars" name="wrap_chars" type="number" min="10" max="80" value="24" />
              </div>

              <div class="field">
                <label for="ratio">화면 비율</label>
                <select id="ratio" name="ratio">
                  <option value="16:9">가로 16:9</option>
                  <option value="9:16">세로 9:16</option>
                </select>
              </div>
            </div>

            <label class="checkbox">
              <input id="include_subtitles" name="include_subtitles" type="checkbox" checked />
              <span>자막 포함</span>
            </label>

            <button type="submit" id="createButton">MP4 영상 생성</button>
          </aside>
        </form>

        <section class="result" id="result" hidden>
          <div>
            <strong id="resultTitle">생성 완료</strong>
            <p id="resultMessage"></p>
          </div>
          <div class="downloads">
            <a id="downloadLink" href="#" download>MP4 다운로드</a>
            <a id="audioLink" href="#" download hidden>MP3 다운로드</a>
          </div>
        </section>
      </section>
    </main>

    <script>
      const form = document.getElementById("videoForm");
      const statusEl = document.getElementById("status");
      const result = document.getElementById("result");
      const resultMessage = document.getElementById("resultMessage");
      const downloadLink = document.getElementById("downloadLink");
      const audioLink = document.getElementById("audioLink");
      const button = document.getElementById("createButton");
      const apiKey = document.getElementById("elevenlabs_key");
      const ttsHint = document.getElementById("ttsHint");

      apiKey.addEventListener("input", () => {
        ttsHint.textContent = apiKey.value.trim()
          ? "키가 있으면 ElevenLabs 음성을 mp3로 만든 뒤 영상에 합칩니다."
          : "키를 입력하지 않으면 TTS는 비활성화되고 무음 영상으로 생성됩니다.";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.hidden = true;
        statusEl.textContent = "생성 중";
        button.disabled = true;
        button.textContent = "생성 중...";

        try {
          const response = await fetch("/api/create-video", {
            method: "POST",
            body: new FormData(form),
          });
          const payload = await response.json();
          if (!response.ok || !payload.ok) {
            throw new Error(payload.message || "영상 생성에 실패했습니다.");
          }

          statusEl.textContent = "완료";
          resultMessage.textContent = payload.message;
          downloadLink.href = payload.download_url;
          audioLink.hidden = !payload.audio_url;
          audioLink.href = payload.audio_url || "#";
          result.hidden = false;
        } catch (error) {
          statusEl.textContent = "오류";
          resultMessage.textContent = error.message;
          downloadLink.href = "#";
          audioLink.hidden = true;
          audioLink.href = "#";
          result.hidden = false;
        } finally {
          button.disabled = false;
          button.textContent = "MP4 영상 생성";
        }
      });
    </script>
  </body>
</html>
