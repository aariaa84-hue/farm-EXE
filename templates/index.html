<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CleanTube Studio</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div>
      <h1>CleanTube Studio</h1>
      <p>클린룸 방식으로 새로 만든 영상 제작 보조 MVP</p>
    </div>
    <button id="saveBtn">프로젝트 저장</button>
  </header>

  <main>
    <section class="card">
      <h2>1. 기본 정보</h2>
      <label>주제 <input id="topic" placeholder="예: AI 시대의 공부법"></label>
      <label>장르/톤
        <select id="genre">
          <option>정보형</option>
          <option>스토리텔링</option>
          <option>코미디</option>
          <option>시네마틱</option>
          <option>교육형</option>
        </select>
      </label>
      <label>목표 길이(초) <input id="duration" type="number" value="60"></label>
      <button id="generateScript">대본 생성</button>
    </section>

    <section class="card">
      <h2>2. 대본/장면</h2>
      <input id="title" placeholder="영상 제목">
      <textarea id="scriptPreview" rows="14" placeholder="생성된 장면이 여기에 표시됩니다."></textarea>
      <button id="generatePrompts">비주얼 프롬프트 생성</button>
    </section>

    <section class="card">
      <h2>3. 비주얼 프롬프트</h2>
      <label>스타일 <input id="style" value="clean Korean explainer animation"></label>
      <label>화면비 <select id="ratio"><option>9:16</option><option>16:9</option><option>1:1</option></select></label>
      <textarea id="promptPreview" rows="12"></textarea>
    </section>

    <section class="card">
      <h2>4. 메타데이터/내보내기</h2>
      <button id="generateMeta">제목·설명·태그 생성</button>
      <button id="exportMd">제작 계획 Markdown 내보내기</button>
      <button id="exportSrt">자막 SRT 다운로드</button>
      <textarea id="metaPreview" rows="10"></textarea>
    </section>

    <section class="card">
      <h2>설정</h2>
      <label>API Base URL <input id="apiBase"></label>
      <label>API Key <input id="apiKey" type="password"></label>
      <label>Model <input id="model"></label>
      <button id="saveSettings">설정 저장</button>
      <small>키가 없으면 로컬 템플릿 결과를 사용합니다.</small>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
